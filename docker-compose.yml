services:
  web:
    build: .
    command: gunicorn infrascope_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app
      - static_volume:/app/static
      - ./media:/app/media
    ports:
      - "8000:8000"
    environment:
      # Enable debug for local development to avoid HTTPS redirection
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      # Development secret; replace with a secure value in production
      DJANGO_SECRET: ${DJANGO_SECRET}
      # Development superuser (auto-created on first start)
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
  
  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - ./media:/app/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web


volumes:
  static_volume: