services:
  web:
    build: .
    command: gunicorn infrascope_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app
      - static_volume:/app/static
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      # Enable debug for local development to avoid HTTPS redirection
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      # Development secret; replace with a secure value in production
      DJANGO_SECRET: ${DJANGO_SECRET}
      # Development superuser (auto-created on first start)
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      # Database configuration
      DATABASE_URL: postgres://infrascope:infrascope@db:5432/infrascope
  
  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_DB: infrascope
      POSTGRES_USER: infrascope
      POSTGRES_PASSWORD: infrascope
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - ./media:/app/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ../infrascope-frontend/dist:/var/www/infrascope-frontend
    depends_on:
      - web


volumes:
  static_volume:
  postgres_data: