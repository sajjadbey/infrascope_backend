{% extends "base.html" %} {% load static %} {% block title %}Network Map —
InfraScope{% endblock %} {% block extra_css %}
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
/>
<style>
  .map-container {
    height: calc(100vh - 120px);
    min-height: 500px;
    width: 100%;
    position: relative;
  }
  #map {
    height: 100%;
    width: 100%;
    z-index: 1;
  }
  .map-header {
    padding: 1.5rem;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-color);
  }
  .map-header h1 {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
  }
  .map-header p {
    margin: 0.25rem 0 0;
    color: var(--text-secondary);
    font-size: 0.9rem;
  }
  .leaflet-popup-content-wrapper {
    border-radius: 8px;
    padding: 5px;
  }
  .node-popup h3 {
    margin: 0;
    padding: 10px 12px;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--color-brand);
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .node-list-container {
    max-height: 400px;
    overflow-y: auto;
    padding: 0 12px;
  }
  .node-popup strong {
    color: var(--text-primary);
  }

  /* Responsive Popups */
  .leaflet-popup-content-wrapper {
    padding: 0;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .leaflet-popup-content {
    margin: 0 !important;
    width: 320px !important;
    max-width: 85vw !important;
  }
  .leaflet-popup-close-button {
    color: var(--text-secondary) !important;
    padding: 10px !important;
    font-size: 16px !important;
    z-index: 20;
  }
  .node-popup h3 {
    box-shadow: 0 1px 4px rgba(0,0,0,0.05); /* Shadow for sticky header */
  }
  
  @media (max-width: 600px) {
    .leaflet-popup-content {
      width: 280px !important;
    }
    .node-list-container {
      max-height: 50vh; /* Better responsive height */
    }
    .map-header {
      padding: 1rem;
    }
    .map-header h1 {
      font-size: 1.2rem;
    }
    .map-header p {
        font-size: 0.8rem;
    }
  }

  /* ── Custom Datacenter Marker ── */
  .datacenter-icon {
      background: none;
      border: none;
  }
  .datacenter-marker {
      width: 40px;
      height: 40px;
      background: var(--color-brand);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4);
      border: 2px solid #fff;
      transition: transform 0.2s, background 0.2s;
  }
  .datacenter-marker:hover {
      background: var(--color-brand-hover);
      transform: rotate(-45deg) scale(1.1);
  }
  .datacenter-marker i, .datacenter-marker span {
      transform: rotate(45deg);
      font-size: 1.2rem;
      color: #fff;
  }
  /* Pulse effect */
  .datacenter-marker::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: inherit;
      opacity: 0.4;
      animation: pulse 2s infinite;
      z-index: -1;
  }
    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.4; }
        100% { transform: scale(2.5); opacity: 0; }
    }
    .node-type-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
        color: #fff;
        margin-right: 4px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        line-height: 1.4;
    }
</style>
{% endblock %} {% block content_wrapper %}
<div class="map-header">
  <h1>Network Topology Map</h1>
  <p>Geographical distribution of network nodes in Iran</p>
</div>
<div class="map-container">
  <div id="map"></div>
</div>
{% endblock %} {% block extra_js %}
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    // Initialize the map centered on Iran
    // Approx center: [32.4278, 53.6880]
    const map = L.map("map").setView([32.4278, 53.688], 6);

    // Add OpenStreetMap tiles
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    // Define custom datacenter icon
    const datacenterIcon = L.divIcon({
        className: 'datacenter-icon',
        html: `
            <div class="datacenter-marker">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                    <path d="M7 15h10v2H7v-2zm0-4h10v2H7v-2zm0-4h10v2H7V7zm15-4v18a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h18a1 1 0 0 1 1 1zm-2 1H4v16h16V4z"/>
                </svg>
            </div>
        `,
        iconSize: [40, 40],
        iconAnchor: [20, 40],
        popupAnchor: [0, -40]
    });

    // Fetch GeoJSON data from our backend
    fetch('{% url "network_nodes_geojson" %}')
      .then((response) => response.json())
      .then((data) => {
        L.geoJSON(data, {
          pointToLayer: function (feature, latlng) {
            return L.marker(latlng, { icon: datacenterIcon });
          },
          onEachFeature: function (feature, layer) {
            if (feature.properties && feature.properties.nodes) {
              let nodesListHtml = '';
              feature.properties.nodes.forEach(node => {
                  let badgesHtml = '';
                  if (node.node_types) {
                      node.node_types.forEach(nt => {
                          badgesHtml += `<span class="node-type-badge" style="background-color: ${nt.color}">${nt.name}</span>`;
                      });
                  }

                  nodesListHtml += `
                                    <div class="node-item" style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color);">
                                        <div style="margin-bottom: 4px;"><strong>${node.name}</strong></div>
                                        <div style="margin-bottom: 8px;">${badgesHtml}</div>
                                        <small>ASN: AS${node.asn_number} (${node.asn_name})</small><br>
                                        <a href="/${node.asn_number}/" style="color: var(--color-brand); font-size: 0.8rem;">View ASN Details</a>
                                    </div>
                                `;
              });
              const popupContent = `
                                <div class="node-popup">
                                    <h3>${feature.properties.name}</h3>
                                    <div class="node-list-container">
                                        ${nodesListHtml}
                                    </div>
                                </div>
                            `;
              layer.bindPopup(popupContent);
            }
          },
        }).addTo(map);
      })
      .catch((error) => {
        console.error("Error loading GeoJSON:", error);
      });
  });
</script>
{% endblock %}
